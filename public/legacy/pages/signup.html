<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YUPLACED — Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth.css">
  <style>
    .auth-card { width: 460px; }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <nav>
    <a href="../pages/index.html" class="nav-logo">YUPLACED</a>
    <a href="../pages/index.html" class="nav-back">← BACK TO HOME</a>
  </nav>

  <div class="auth-card">
    <div class="auth-eyebrow">CREATE ACCOUNT</div>
    <div class="auth-title">SIGN UP</div>
    <div class="auth-sub">Start owning your day. Free for 14 days.</div>

    <!-- Сообщение об ошибке -->
    <div id="error-msg" style="display:none; color:#f44336; font-family:var(--mono); font-size:12px; margin-bottom:16px; padding:10px; border:1px solid #f4433640; background:#f4433610; border-radius:4px;"></div>

    <div class="field">
      <label class="field-label">NICKNAME</label>
      <input class="field-input" type="text" id="nickname-input" placeholder="e.g. alex42">
    </div>

    <div class="field">
      <label class="field-label">EMAIL</label>
      <input class="field-input" type="email" id="email-input" placeholder="you@example.com">
    </div>

    <div class="field">
      <label class="field-label">PASSWORD</label>
      <input class="field-input" type="password" placeholder="Min. 8 characters" id="pwd-input">
      <div class="password-strength">
        <div class="strength-bar" id="s1"></div>
        <div class="strength-bar" id="s2"></div>
        <div class="strength-bar" id="s3"></div>
        <span class="strength-label" id="s-label"></span>
      </div>
    </div>

    <div class="terms-row">
      <div class="terms-check" id="terms-check" onclick="this.classList.toggle('checked')"></div>
      <div class="terms-text">
        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a> of YUPLACED.
      </div>
    </div>

    <button class="btn-submit" id="signup-btn" onclick="handleSignup()">CREATE ACCOUNT →</button>

    <div class="auth-divider"><span>OR</span></div>

    <div class="auth-switch">
      Already have an account? <a href="login.html">LOG IN</a>
    </div>
  </div>

  <script src="../js/bg-animation.js"></script>
  <script src="../js/api.js"></script>
  <script>
    // Если уже залогинен — сразу в приложение
    if (isLoggedIn()) window.location.href = 'yunote.html';

    // Password strength indicator
    document.getElementById('pwd-input').addEventListener('input', function () {
      const v = this.value;
      const bars  = ['s1','s2','s3'].map(id => document.getElementById(id));
      const label = document.getElementById('s-label');
      bars.forEach(b => b.className = 'strength-bar');
      if (!v.length) { label.textContent = ''; return; }
      if (v.length < 6) {
        bars[0].classList.add('weak');
        label.textContent = 'WEAK'; label.style.color = '#f44336';
      } else if (v.length < 10) {
        bars[0].classList.add('medium'); bars[1].classList.add('medium');
        label.textContent = 'FAIR'; label.style.color = '#ff9800';
      } else {
        bars.forEach(b => b.classList.add('strong'));
        label.textContent = 'STRONG'; label.style.color = '#4caf50';
      }
    });

    async function handleSignup() {
      const nickname = document.getElementById('nickname-input').value.trim();
      const email    = document.getElementById('email-input').value.trim();
      const password = document.getElementById('pwd-input').value;
      const terms    = document.getElementById('terms-check').classList.contains('checked');
      const btn      = document.getElementById('signup-btn');

      if (!nickname || !email || !password) {
        showError('Please fill in all fields.');
        return;
      }
      if (password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }
      if (!terms) {
        showError('Please agree to the Terms of Service.');
        return;
      }

      btn.textContent = 'CREATING...';
      btn.disabled = true;

      try {
        await Auth.signup(nickname, email, password);
        window.location.href = 'login.html';
      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
        btn.textContent = 'CREATE ACCOUNT →';
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
