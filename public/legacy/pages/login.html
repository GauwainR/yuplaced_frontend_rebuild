<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YUPLACED — Log In</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <nav>
    <a href="../pages/index.html" class="nav-logo">YUPLACED</a>
    <a href="../pages/index.html" class="nav-back">← BACK TO HOME</a>
  </nav>

  <div class="auth-card">
    <div class="auth-eyebrow">WELCOME BACK</div>
    <div class="auth-title">LOG IN</div>
    <div class="auth-sub">Access your personal productivity hub.</div>

    <!-- Сообщение об ошибке -->
    <div id="error-msg" style="display:none; color:#f44336; font-family:var(--mono); font-size:12px; margin-bottom:16px; padding:10px; border:1px solid #f4433640; background:#f4433610; border-radius:4px;"></div>

    <div class="field">
      <label class="field-label">EMAIL</label>
      <input class="field-input" type="email" id="email-input" placeholder="you@example.com">
    </div>

    <div class="field">
      <label class="field-label">PASSWORD</label>
      <input class="field-input" type="password" id="password-input" placeholder="••••••••">
    </div>

    <div class="forgot">
      <a href="restore-password.html">FORGOT PASSWORD?</a>
    </div>

    <button class="btn-submit" id="login-btn" onclick="handleLogin()">LOG IN →</button>

    <div class="auth-divider"><span>OR</span></div>

    <div class="auth-switch">
      Don't have an account? <a href="signup.html">SIGN UP</a>
    </div>
  </div>

  <script src="../js/bg-animation.js"></script>
  <script src="../js/api.js"></script>
  <script>
    // Если уже залогинен — сразу в приложение
    if (isLoggedIn()) window.location.href = 'dashboard.html';

    // Enter на полях
    ['email-input', 'password-input'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
      });
    });

    async function handleLogin() {
      const email    = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value;
      const btn      = document.getElementById('login-btn');
      const errEl    = document.getElementById('error-msg');

      errEl.style.display = 'none';

      if (!email || !password) {
        showError('Please fill in all fields.');
        return;
      }

      btn.textContent = 'LOGGING IN...';
      btn.disabled = true;

      try {
        const data = await Auth.login(email, password);
        console.log('Login response:', data);
        localStorage.setItem('yuplaced_token', data.access_token);
        console.log('Token saved:', localStorage.getItem('yuplaced_token'));
        window.location.href = 'dashboard.html';
      } catch (err) {
        console.error('Login error:', err);
        showError(err.message || 'Invalid email or password.');
        btn.textContent = 'LOG IN →';
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
