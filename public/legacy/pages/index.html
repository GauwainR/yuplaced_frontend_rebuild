<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YUPLACED — Your personal productivity hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <style>
    section { position: relative; z-index: 1; }

    /* ── Hero ── */
    #hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 120px 48px 80px;
    }
    .hero-eyebrow { font-size: 11px; letter-spacing: 5px; color: var(--pink); margin-bottom: 20px; }
    .hero-title {
      font-family: var(--mono);
      font-size: clamp(64px, 9vw, 110px);
      letter-spacing: 14px; color: var(--pink); line-height: 1;
      margin-bottom: 20px; font-weight: 700;
      text-shadow: 0 0 16px var(--pink), 0 0 40px #e040a090, 0 0 80px #e040a040;
    }
    .hero-sub { font-size: 15px; color: var(--muted); margin-bottom: 56px; letter-spacing: 1px; max-width: 520px; line-height: 1.9; }
    .hero-ctas { display: flex; gap: 16px; margin-bottom: 0; margin-top: 0; }

    /* App pills */
    .hero-app-pills { display: flex; gap: 16px; align-items: center; }
    .app-pill {
      font-size: 11px; letter-spacing: 3px; padding: 12px 28px;
      border: 1px solid var(--border); color: var(--muted);
      transition: border-color .3s, color .3s, box-shadow .3s;
      position: relative; cursor: default;
      display: flex; align-items: center; gap: 10px;
    }
    .app-pill::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--border); transition: background .3s, box-shadow .3s; flex-shrink: 0; }
    .app-pill.active  { border-color: var(--pink); color: var(--pink); box-shadow: 0 0 20px #e040a020, inset 0 0 20px #e040a008; }
    .app-pill.active::before { background: var(--pink); box-shadow: 0 0 8px var(--pink); animation: dotPulse 1.8s ease-in-out infinite; }
    @keyframes dotPulse { 0%,100%{box-shadow:0 0 4px var(--pink)} 50%{box-shadow:0 0 12px var(--pink),0 0 20px #e040a060} }

    /* Scroll hint */
    .scroll-hint { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 8px; letter-spacing: 2px; color: #444; }
    .scroll-hint-line { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--border), transparent); animation: scrollPulse 2s ease-in-out infinite; }
    @keyframes scrollPulse { 0%,100%{opacity:.3} 50%{opacity:1} }

    /* Footer */
    footer { padding: 28px 48px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); position: relative; z-index: 1; }
    .footer-logo { font-family: var(--mono); font-size: 13px; letter-spacing: 3px; color: #fff; }
    .footer-copy  { font-size: 9px; color: #444; letter-spacing: 1px; }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">YUPLACED</a>
    <div class="nav-links"></div>
    <div class="nav-auth">
      <a href="login.html">LOG IN</a>
      <a href="signup.html" class="signup">SIGN UP</a>
    </div>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div class="geo">
      <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" fill="none">
        <polygon points="100,800 400,200 700,800"  stroke="#e040a0" stroke-width="1" opacity="0.07"/>
        <polygon points="800,900 1100,200 1400,900" stroke="#e040a0" stroke-width="1" opacity="0.06"/>
        <polygon points="-100,600 200,0 500,600"   stroke="#e040a0" stroke-width="0.5" opacity="0.04"/>
      </svg>
    </div>

    <div class="hero-eyebrow">YOUR PERSONAL PRODUCTIVITY HUB</div>
    <div class="hero-title">YUPLACED</div>
    <div class="hero-sub">Track your day, manage tasks,<br>and reflect your progress.</div>

    <div class="hero-app-pills" style="margin-bottom:32px;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div class="app-pill active">YUNOTE</div>
        <span style="font-size:8px;letter-spacing:2px;color:var(--pink);">AVAILABLE</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div class="app-pill">YUCLOUD</div>
        <span style="font-size:8px;letter-spacing:2px;color:#444;">COMING SOON</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div class="app-pill">YUNA</div>
        <span style="font-size:8px;letter-spacing:2px;color:#444;">COMING SOON</span>
      </div>
    </div>

    <div style="width:1px;height:48px;background:linear-gradient(to bottom,var(--border),transparent);margin:0 auto 32px;"></div>

    <div class="hero-ctas">
      <button class="btn-primary" onclick="window.location.href='signup.html'">Get started</button>
      <button class="btn-secondary">Explore apps</button>
    </div>

    <div style="position:absolute;bottom:40px;left:50%;transform:translateX(-50%);">
      <div class="scroll-hint"><div class="scroll-hint-line"></div></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">YUPLACED</div>
    <div class="footer-copy">© 2026 YUPLACED</div>
  </footer>
  <script src="../js/api.js"></script>
  <script>
    //if (isLoggedIn()) window.location.href = 'dashboard.html';
  </script>
  <script src="../js/bg-animation.js"></script>
</body>
</html>
